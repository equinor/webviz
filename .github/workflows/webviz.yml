name: webviz

permissions:
  contents: read

on:
  push:
  pull_request:
    branches:
      # Keep in sync with protected branches in repository settings
      - main
      - "**/main"
  release:
    types:
      - published

jobs:
  frontend:
    runs-on: ubuntu-22.04

    steps:
      - name: 📖 Checkout commit locally
        uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: ℹ️ Node and npm versions
        run: |
          node -v
          npm -v

      - name: 📦 Install build dependencies
        working-directory: ./frontend
        run: |
          npm ci --include=dev

      - name: ℹ️ Installed npm packages (depth = 0)
        working-directory: ./frontend
        run: npm list --depth=0

      - name: 🏗️ Build JavaScript bundle
        working-directory: ./frontend
        run: npm run build

      - name: 🕵️ Check code style, linting & dependencies
        working-directory: ./frontend
        run: |
          npm run validate

      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright Browsers
        working-directory: ./frontend
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          npx playwright install --with-deps

      - name: Install Playwright system dependencies
        working-directory: ./frontend
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          npx playwright install-deps

      - name: 🤖 Run unit tests
        working-directory: ./frontend
        run: |
          npm run test:unit

      - name: 🤖 Run component tests
        working-directory: ./frontend
        run: |
          npm run test:ct

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker build layers
        uses: actions/cache@v4
        with:
          path: /tmp/buildx-cache
          # Key covers only the files that drive the expensive layers (poetry install).
          # Source-only changes (backend_py/primary/**) intentionally do not bust this
          # cache — the buildx layer cache handles those incrementally via restore-keys,
          # so only the layers from COPY primary onward are rebuilt on source changes.
          key: backend-docker-${{ runner.os }}-${{ hashFiles('backend_py/primary/Dockerfile', 'backend_py/primary/pyproject.toml', 'backend_py/primary/poetry.lock', 'backend_py/libs/**') }}
          restore-keys: |
            backend-docker-${{ runner.os }}-

      - name: 🕵️ Check auto-generated frontend code is in sync with backend
        run: |
          set -euo pipefail

          # Build using the local BuildKit cache for layer-level caching.
          # Writes to a separate directory to avoid corrupting the restored cache
          # mid-build; the swap below atomically replaces it for the next run.
          docker buildx build \
            -f ./backend_py/primary/Dockerfile \
            -t backend:latest \
            --cache-from type=local,src=/tmp/buildx-cache \
            --cache-to type=local,dest=/tmp/buildx-cache-new,mode=max \
            --load \
            .

          # Swap: replace the restored cache with the freshly written one.
          rm -rf /tmp/buildx-cache
          mv /tmp/buildx-cache-new /tmp/buildx-cache

          CONTAINER_ID=$(docker run --detach -p 5000:5000 \
            --env UVICORN_PORT=5000 \
            --env WEBVIZ_SKIP_LIFESPAN_GENERATE_API_ONLY=true \
            --env WEBVIZ_CLIENT_SECRET=0 \
            --env WEBVIZ_SMDA_SUBSCRIPTION_KEY=0 \
            --env WEBVIZ_VDS_HOST_ADDRESS=0 \
            --env WEBVIZ_ENTERPRISE_SUBSCRIPTION_KEY=0 \
            backend:latest)

          # Single-quoted so $CONTAINER_ID is expanded at exit time, not now.
          trap 'docker stop "$CONTAINER_ID"' EXIT

          sleep 10
          npm run generate:api --prefix ./frontend
          git diff --exit-code ./frontend/src/api

      - name: 🕵️ Check ModuleSerializedStateMap is up to date
        working-directory: ./frontend
        run: |
          npm run generate:module-states-map
          git diff --exit-code src/modules/ModuleSerializedStateMap.ts || exit 1

  backend_py:
    runs-on: ubuntu-latest

    steps:
      - name: 📖 Checkout commit locally
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
          cache: pip

      - name: 📦 Install poetry and check dependency locks
        working-directory: ./backend_py
        run: |
          set -x
          pip install --upgrade pip
          pip install poetry==2.1.4
          poetry config virtualenvs.create false

          # Check that lock files are consistent with pyproject.toml
          poetry check --lock
          poetry check --lock --directory=./libs/core_utils
          poetry check --lock --directory=./libs/server_schemas
          poetry check --lock --directory=./libs/services
          poetry check --lock --directory=./primary
          poetry check --lock --directory=./user_grid3d_ri

          # Install our repo tooling (mypy, pylint, etc.)
          poetry install

      - name: 🕵️ Check formatting and security
        working-directory: ./backend_py
        run: |
          set -x
          black --check .
          bandit --recursive primary/ libs/ user_grid3d_ri/ --exclude tests

      - name: 🕵️ Check linting & typing for primary
        working-directory: ./backend_py
        run: |
          set -x
          (cd primary && poetry install)
          scripts/pylint-primary-all.sh
          scripts/mypy-primary-all.sh

      - name: 🤖 Run tests for primary
        working-directory: ./backend_py/primary
        env:
          WEBVIZ_CLIENT_SECRET: 0
          WEBVIZ_SMDA_SUBSCRIPTION_KEY: 0
          WEBVIZ_VDS_HOST_ADDRESS: 0
          WEBVIZ_ENTERPRISE_SUBSCRIPTION_KEY: 0
        run: |
          pytest ./tests/unit

      - name: 🕵️ Check linting & typing for user_grid3d_ri
        working-directory: ./backend_py
        run: |
          set -x
          (cd user_grid3d_ri && poetry install)
          scripts/pylint-user-grid3d-ri-all.sh
          scripts/mypy-user-grid3d-ri-all.sh

  backend_go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: "1.23.x"
      - name: Install dependencies
        working-directory: ./backend_go/surface_query
        run: |
          go get .
      - name: Test with Go
        working-directory: ./backend_go/surface_query
        run: |
          go test ./...

  build_docker_images:
    runs-on: ubuntu-latest

    steps:
      - name: 📖 Checkout commit locally
        uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: 🐳 Verify Docker images build
        run: |
          docker build -f frontend-prod.Dockerfile .
          docker build -f ./backend_py/primary/Dockerfile .
