<svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <!--
    Original: 6 full-width horizontal zone bars (viridis colours) +
    5 thin vertical wellbore lines reaching different depths +
    5 black completion rectangles (~6px wide) at different y positions / heights.
    Coords scaled from original viewBox "0 0 235.5 74.8".
    Wells at x ≈ 17, 42, 73, 102, 127   (original x/235.5 × 150)
    Completion heights: 50, 100, 50, 25, 75  (proportional to original h: 25,50,24,12,37)
  -->
  <!-- 6 horizontal zone bars, full width, dark→light teal -->
  <rect x="0" y="0"   width="150" height="25" fill="#114a52"/>
  <rect x="0" y="25"  width="150" height="25" fill="#206f77"/>
  <rect x="0" y="50"  width="150" height="25" fill="#3d8e98"/>
  <rect x="0" y="75"  width="150" height="25" fill="#5aafba"/>
  <rect x="0" y="100" width="150" height="25" fill="#91c8ce"/>
  <rect x="0" y="125" width="150" height="25" fill="#cfe7e9"/>
  <!-- Thin white zone dividers -->
  <line x1="0" y1="25"  x2="150" y2="25"  stroke="#fff" stroke-width="0.5"/>
  <line x1="0" y1="50"  x2="150" y2="50"  stroke="#fff" stroke-width="0.5"/>
  <line x1="0" y1="75"  x2="150" y2="75"  stroke="#fff" stroke-width="0.5"/>
  <line x1="0" y1="100" x2="150" y2="100" stroke="#fff" stroke-width="0.5"/>
  <line x1="0" y1="125" x2="150" y2="125" stroke="#fff" stroke-width="0.5"/>
  <!-- Thin wellbore lines (1px), from surface to penetration depth -->
  <line x1="17"  y1="0" x2="17"  y2="120" stroke="#1d1d1d" stroke-width="1"/>
  <line x1="42"  y1="0" x2="42"  y2="150" stroke="#1d1d1d" stroke-width="1"/>
  <line x1="73"  y1="0" x2="73"  y2="72"  stroke="#1d1d1d" stroke-width="1"/>
  <line x1="102" y1="0" x2="102" y2="96"  stroke="#1d1d1d" stroke-width="1"/>
  <line x1="127" y1="0" x2="127" y2="124" stroke="#1d1d1d" stroke-width="1"/>
  <!-- Completion rectangles (6px wide, centred on well x) -->
  <!-- Well 1 (x=17): bars 4-5 → y=75..125, h=50 -->
  <rect x="14"  y="75"  width="6" height="50"  fill="#1d1d1d"/>
  <!-- Well 2 (x=42): bars 3-6 → y=50..150, h=100 — tallest -->
  <rect x="39"  y="50"  width="6" height="100" fill="#1d1d1d"/>
  <!-- Well 3 (x=73): bars 3-4 → y=50..100, h=50 -->
  <rect x="70"  y="50"  width="6" height="50"  fill="#1d1d1d"/>
  <!-- Well 4 (x=102): bar 4 only → y=75..100, h=25 — shortest -->
  <rect x="99"  y="75"  width="6" height="25"  fill="#1d1d1d"/>
  <!-- Well 5 (x=127): bars 3-5 → y=50..125, h=75 -->
  <rect x="124" y="50"  width="6" height="75"  fill="#1d1d1d"/>
</svg>