<svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <!--
    One main curve top-left → bottom-right (the spine).
    7 subsidiary curves each start from a point along that spine and
    branch off toward the upper-right — progressively shorter because
    each starts further to the right. All subsidiaries are almost parallel.
    Main curve: bezier M12,16 C55,52 100,90 143,132
    Spine sample points (bezier t values):
      t=0.12 → (28,29)   t=0.25 → (45,43)   t=0.40 → (64,59)
      t=0.50 → (78,71)   t=0.62 → (93,85)   t=0.75 → (110,101)  t=0.87 → (124,113)
    Each subsidiary goes right and gently upward to x=143 at lower y.
  -->
  <polyline points="12,12 12,142 143,142" fill="none" stroke="#626467" stroke-width="0.8"/>
  <line x1="12" y1="42" x2="143" y2="42" stroke="#e1e1e1" stroke-width="0.5"/>
  <line x1="12" y1="72" x2="143" y2="72" stroke="#e1e1e1" stroke-width="0.5"/>
  <line x1="12" y1="102" x2="143" y2="102" stroke="#e1e1e1" stroke-width="0.5"/>
  <line x1="42" y1="12" x2="42" y2="142" stroke="#e1e1e1" stroke-width="0.5"/>
  <line x1="82" y1="12" x2="82" y2="142" stroke="#e1e1e1" stroke-width="0.5"/>
  <line x1="122" y1="12" x2="122" y2="142" stroke="#e1e1e1" stroke-width="0.5"/>
  <!-- Main spine: top-left → bottom-right -->
  <path fill="none" stroke="#006aa0" stroke-width="5" d="M12,16 C55,52 100,90 143,132"/>
  <!-- Subsidiary curves: start on spine, go right+slightly-up to right edge -->
  <path fill="none" stroke="#006aa0" stroke-width="3.0" d="M28,29  C68,20  110,14 143,14"/>
  <path fill="none" stroke="#006aa0" stroke-width="3.0" d="M45,43  C80,34  115,26 143,26"/>
  <path fill="none" stroke="#006aa0" stroke-width="3.0" d="M64,59  C92,50  120,40 143,40"/>
  <path fill="none" stroke="#006aa0" stroke-width="3.0" d="M78,71  C102,63 126,56 143,56"/>
  <path fill="none" stroke="#006aa0" stroke-width="3.0" d="M93,85  C112,78 130,72 143,72"/>
  <path fill="none" stroke="#006aa0" stroke-width="3.0" d="M110,101 C123,96 134,90 143,90"/>
  <path fill="none" stroke="#006aa0" stroke-width="3.0" d="M124,113 C131,110 138,106 143,106"/>
</svg>