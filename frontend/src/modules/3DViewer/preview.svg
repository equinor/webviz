<svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <!--
    Cube corners (depth offset vector = +22x, -30y from front to back):
    Front-top-left (18,64)  Front-top-right (110,64)
    Front-bot-left (18,116) Front-bot-right (110,116)
    Back-top-left  (40,34)  Back-top-right  (132,34)
                            Back-bot-right  (132,86)
    Bounding box: x=18..132 (w=114, centred at 75), y=34..116 (h=82, centred at 75)

    Front face: 4 cols (step=23 → x=41,64,87), 3 rows (step≈17 → y=81,99)
    Top face cols:  (41,64)→(63,34), (64,64)→(86,34), (87,64)→(109,34)
    Top face rows:  t=1/3 → (25,54)→(117,54) ; t=2/3 → (33,44)→(125,44)
    Right face rows: (110,81)→(132,51) ; (110,99)→(132,69)
    Right face cols: (117,54)→(117,106) ; (125,44)→(125,96)
  -->
  <defs>
    <clipPath id="clip-front"><polygon points="18,64 110,64 110,116 18,116"/></clipPath>
    <clipPath id="clip-top">  <polygon points="18,64 110,64 132,34 40,34"/></clipPath>
    <clipPath id="clip-right"><polygon points="110,64 132,34 132,86 110,116"/></clipPath>
  </defs>
  <!-- Face fills -->
  <polygon points="18,64 110,64 110,116 18,116"  fill="#eaf8fa"/>
  <polygon points="18,64 110,64 132,34 40,34"    fill="#cfe7e9"/>
  <polygon points="110,64 132,34 132,86 110,116" fill="#91c8ce"/>
  <!-- Front face: highlighted cells, then grid -->
  <g clip-path="url(#clip-front)">
    <rect x="18" y="99"  width="23" height="17" fill="#206f77" fill-opacity="0.3"/>
    <rect x="41" y="81"  width="23" height="18" fill="#206f77" fill-opacity="0.5"/>
    <rect x="64" y="64"  width="23" height="17" fill="#206f77" fill-opacity="0.75"/>
    <line x1="41"  y1="64"  x2="41"  y2="116" stroke="#206f77" stroke-width="0.6" stroke-opacity="0.55"/>
    <line x1="64"  y1="64"  x2="64"  y2="116" stroke="#206f77" stroke-width="0.6" stroke-opacity="0.55"/>
    <line x1="87"  y1="64"  x2="87"  y2="116" stroke="#206f77" stroke-width="0.6" stroke-opacity="0.55"/>
    <line x1="18"  y1="81"  x2="110" y2="81"  stroke="#206f77" stroke-width="0.6" stroke-opacity="0.55"/>
    <line x1="18"  y1="99"  x2="110" y2="99"  stroke="#206f77" stroke-width="0.6" stroke-opacity="0.55"/>
  </g>
  <!-- Top face: col lines parallel to depth vector, row lines parallel to width -->
  <g clip-path="url(#clip-top)" fill="none" stroke="#206f77" stroke-width="0.6" stroke-opacity="0.55">
    <line x1="41"  y1="64" x2="63"  y2="34"/>
    <line x1="64"  y1="64" x2="86"  y2="34"/>
    <line x1="87"  y1="64" x2="109" y2="34"/>
    <line x1="25"  y1="54" x2="117" y2="54"/>
    <line x1="33"  y1="44" x2="125" y2="44"/>
  </g>
  <!-- Right face: row lines parallel to depth vector, col lines vertical -->
  <g clip-path="url(#clip-right)" fill="none" stroke="#206f77" stroke-width="0.6" stroke-opacity="0.55">
    <line x1="110" y1="81"  x2="132" y2="51"/>
    <line x1="110" y1="99"  x2="132" y2="69"/>
    <line x1="117" y1="54"  x2="117" y2="106"/>
    <line x1="125" y1="44"  x2="125" y2="96"/>
  </g>
  <!-- Face outlines on top -->
  <polygon points="18,64 110,64 110,116 18,116"   fill="none" stroke="#626467" stroke-width="0.8"/>
  <polygon points="18,64 110,64 132,34 40,34"     fill="none" stroke="#626467" stroke-width="0.8"/>
  <polygon points="110,64 132,34 132,86 110,116"  fill="none" stroke="#626467" stroke-width="0.8"/>
</svg>